name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest requests

      - name: Run full test suite
        run: python -m pytest

      - name: Capture API test results
        run: |
          mkdir -p test-results
          python -m pytest api/tests --junitxml=test-results/api-junit.xml

      - name: Capture kill test results
        run: python -m pytest tests --junitxml=test-results/tests-junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
